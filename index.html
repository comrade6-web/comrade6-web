<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comrade6 | World Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #000; color: #fff; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        tr { border-bottom: 1px solid #111; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b border-white/5">
        <div class="flex items-center gap-2 font-bold italic">
            <div class="w-10 h-10 bg-blue-600 rounded flex items-center justify-center text-white">6</div>
            <span>COMRADE6</span>
        </div>
        <button id="btnConnect" onclick="connect()" class="bg-blue-600 px-6 py-2 rounded-full text-xs font-bold uppercase">Connect Wallet</button>
    </nav>

    <section class="max-w-5xl mx-auto text-center py-12 px-6">
        <h1 id="mainTitle" class="text-6xl md:text-8xl font-bold italic uppercase tracking-tighter mb-12">Transparent <br><span class="text-blue-500">Growth</span></h1>

        <div id="doorJoin" class="block">
            <div class="max-w-xl mx-auto mb-10 p-6 glass rounded-3xl text-left border-red-900/20">
                <p class="text-[10px] text-gray-500 uppercase leading-relaxed font-bold">
                    <input type="checkbox" id="checkRisk" class="mr-2"> I understand that this is a DECENTRALIZED PROTOCOL. Wallet security is my responsibility. Non-Refundable.
                </p>
            </div>
            <button onclick="join()" class="bg-white text-black px-12 py-5 rounded-2xl text-2xl font-black italic uppercase">ACTIVATE SQUAD - $6</button>
        </div>

        <div id="doorEmpire" class="hidden">
            <div class="grid md:grid-cols-3 gap-6 mb-12 text-left">
                <div class="glass p-8 rounded-3xl border-l-4 border-blue-600">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">My Balance</p>
                    <h3 id="txtBal" class="text-4xl font-bold text-blue-500">$0.00</h3>
                </div>
                <div class="glass p-8 rounded-3xl border-l-4 border-green-600">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Referral Link</p>
                    <button onclick="copyRef()" class="mt-2 w-full bg-blue-600 py-2 rounded-lg text-[10px] font-bold uppercase">Copy Link</button>
                </div>
            </div>

            <div class="glass p-10 rounded-[40px] border-t-4 border-blue-600">
                <h2 class="text-2xl font-bold italic uppercase mb-10">Matrix Empire</h2>
                <table class="w-full text-left text-sm">
                    <thead><tr class="text-gray-600 uppercase text-[10px]"><th>Level</th><th>Status</th><th>Earnings</th></tr></thead>
                    <tbody id="matrixRows"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script>
        const ADDR_CONTRACT = "0xC1e717690fF8B5820Af8C6a32ED6789805d4B366";
        const ADDR_USDT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const ADDR_FOUNDER = "0x31838e2FA16f364b54B8F3B186f3AeeD68df816f".toLowerCase();

        let user, provider, signer, cUSDT, cSquad;

        async function connect() {
            if(!window.ethereum) return alert("MetaMask!");
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            user = (await signer.getAddress()).toLowerCase();
            
            document.getElementById('btnConnect').innerText = user.substring(0,6)+"...";
            
            cUSDT = new ethers.Contract(ADDR_USDT, ["function balanceOf(address) view returns (uint256)", "function approve(address, uint256) external returns (bool)"], signer);
            cSquad = new ethers.Contract(ADDR_CONTRACT, ["function join(address, uint256) external", "function totalUsers() view returns (uint256)"], signer);

            sync();
        }

        async function sync() {
            const balRaw = await cUSDT.balanceOf(user);
            const bal = parseFloat(ethers.utils.formatUnits(balRaw, 6));
            document.getElementById('txtBal').innerText = "$" + bal.toFixed(2);

            // LOGIKA PEMBUKA PINTU: 
            // Jika Founder ATAU Saldo di bawah $2 (berarti sudah bayar $6)
            if (user === ADDR_FOUNDER || bal < 2) {
                document.getElementById('doorJoin').classList.add('hidden');
                document.getElementById('doorEmpire').classList.remove('hidden');
                document.getElementById('mainTitle').innerHTML = "Welcome back, <br><span class="text-blue-500 uppercase">Comrade</span>";
                
                const body = document.getElementById('matrixRows');
                body.innerHTML = "";
                for(let i=1; i<=9; i++) {
                    body.innerHTML += `<tr><td class="p-4 font-bold">Level ${i}</td><td class="p-4 text-blue-400">Progress</td><td class="p-4 text-green-500 font-mono">$${i==1 ? "6.00" : "0.00"}</td></tr>`;
                }
            }
        }

        async function join() {
            if(!document.getElementById('checkRisk').checked) return alert("Check disclaimer!");
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref') || "0x0000000000000000000000000000000000000000";
            const amount = ethers.utils.parseUnits("6", 6);
            
            const tx1 = await cUSDT.approve(ADDR_CONTRACT, amount);
            await tx1.wait();
            const tx2 = await cSquad.join(ref, amount);
            await tx2.wait();
            location.reload();
        }

        function copyRef() {
            navigator.clipboard.writeText("https://comrade6.com/?ref="+user);
            alert("Copied!");
        }
    </script>
</body>
</html>
