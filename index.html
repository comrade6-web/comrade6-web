<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comrade6 | World Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #000000; color: #ffffff; scroll-behavior: smooth; }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        tr { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        th { color: #6b7280; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; padding: 20px 15px; }
        td { padding: 20px 15px; font-size: 13px; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b border-white/5 uppercase tracking-widest text-[10px] font-bold">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-xl italic shadow-lg">6</div>
            <span class="text-xl">Comrade<span class="text-blue-500">6</span></span>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition">Connect Wallet</button>
    </nav>

    <section class="max-w-6xl mx-auto text-center py-12 px-6">
        <h1 id="heroTitle" class="text-5xl md:text-8xl font-bold tracking-tighter mb-6 leading-none uppercase italic">
            Transparent <br><span class="text-blue-500 neon-text italic">Decentralized</span> Growth
        </h1>

        <div id="userDashboard" class="hidden grid md:grid-cols-3 gap-6 mb-16 text-left">
            <div class="glass-card p-8 rounded-3xl border-l-4 border-blue-600">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">My Balance</p>
                <h3 id="userBalance" class="text-4xl font-bold text-blue-500">$0.00</h3>
            </div>
            <div class="glass-card p-8 rounded-3xl border-l-4 border-white/10">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Global Squad</p>
                <h3 id="totalUsers" class="text-4xl font-bold text-white">0</h3>
            </div>
            <div class="glass-card p-8 rounded-3xl border-l-4 border-green-600">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Ref Link</p>
                <div class="flex flex-col gap-3">
                    <input type="text" id="refLinkInput" readonly class="bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-[10px] text-blue-400 font-mono" value="...">
                    <button onclick="copyRef()" class="w-full bg-blue-600 text-white px-4 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Copy My Link</button>
                </div>
            </div>
        </div>

        <div id="matrixSection" class="hidden max-w-5xl mx-auto py-12 px-6 glass-card rounded-[40px] mb-16 border-t-4 border-blue-600 shadow-2xl">
            <h2 class="font-bold uppercase italic text-2xl mb-12 text-center">My Matrix Empire</h2>
            <div class="overflow-x-auto mb-10 text-left">
                <table class="w-full">
                    <thead>
                        <tr><th>Level</th><th>Progress</th><th>Earnings</th></tr>
                    </thead>
                    <tbody id="matrixTableBody"></tbody>
                </table>
            </div>
            <div class="grid grid-cols-2 gap-10 text-left border-t border-white/5 pt-10">
                <div><p class="text-[8px] text-gray-600 uppercase font-bold">Squad Size</p><p id="teamSizeVal" class="text-white font-bold text-xl">0</p></div>
                <div><p class="text-[8px] text-gray-600 uppercase font-bold italic">Total Earnings</p><p id="totalProfitVal" class="text-green-500 font-bold text-xl">$0.00</p></div>
            </div>
        </div>

        <div id="joinArea">
            <div class="max-w-2xl mx-auto mb-10 p-8 glass-card rounded-3xl border-red-900/20 text-left">
                <div class="flex items-start gap-4">
                    <input type="checkbox" id="riskAgree" class="mt-1 h-6 w-6 rounded border-white/10 bg-black text-blue-600 cursor-pointer">
                    <label for="riskAgree" class="text-[11px] text-gray-400 uppercase leading-relaxed font-medium cursor-pointer">
                        <span class="text-red-500 font-bold">LEGAL:</span> This is a <span class="text-white font-bold uppercase">Decentralized Protocol</span>. I am responsible for my <span class="text-white font-bold underline italic">MetaMask Security</span>. Developers have NO liability for any lost funds. Non-Refundable.
                    </label>
                </div>
            </div>
            <button onclick="joinSquad(6)" class="bg-white text-black px-16 py-6 rounded-2xl text-2xl font-black hover:bg-blue-500 hover:text-white transition uppercase italic">Activate Squad - $6</button>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script>
        const contractAddress = "0xC1e717690fF8B5820Af8C6a32ED6789805d4B366";
        const usdtAddress = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const founder001 = "0x31838e2FA16f364b54B8F3B186f3AeeD68df816f".toLowerCase();

        const contractABI = [
            "function join(address _referrer, uint256 _package) external", 
            "function totalUsers() view returns (uint256)",
            "function users(address) view returns (address, uint256, uint256, uint256)"
        ];
        const usdtABI = ["function approve(address spender, uint256 amount) external returns (bool)", "function balanceOf(address account) view returns (uint256)"];

        let signer, contract, usdtContract, userAddr;

        async function connectWallet() {
            if (!window.ethereum) return alert("MetaMask required");
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddr = accounts[0];
                signer = await provider.getSigner();
                contract = new ethers.Contract(contractAddress, contractABI, signer);
                usdtContract = new ethers.Contract(usdtAddress, usdtABI, signer);

                document.getElementById('connectBtn').innerText = userAddr.substring(0,6) + "...";
                document.getElementById('userDashboard').classList.remove('hidden');

                // Update UI terus menerus tapi aman (polling)
                setInterval(async () => {
                    try {
                        await updateUI();
                        await checkAndOpenDoor();
                    } catch(e) {}
                }, 2500);
            } catch (err) { console.error(err); }
        }

        async function checkAndOpenDoor() {
            if (!userAddr) return;
            // 1. BYPASS FOUNDER (SELALU TERBUKA)
            if (userAddr.toLowerCase() === founder001) {
                const data = await contract.users(userAddr);
                const earns = ethers.formatUnits(data[2], 6);
                const squad = data[3].toString();
                showDashboard("FOUNDER 001", earns, squad);
                return;
            }
            // 2. CEK MEMBER BIASA
            try {
                const userData = await contract.users(userAddr);
                if (parseInt(userData[1]) > 0 || userData[0] !== "0x0000000000000000000000000000000000000000") {
                    const earns = ethers.formatUnits(userData[2], 6);
                    const squad = userData[3].toString();
                    showDashboard("COMRADE", earns, squad);
                }
            } catch(e) {}
        }

        function showDashboard(label, earns, squad) {
            document.getElementById('joinArea').classList.add('hidden');
            document.getElementById('matrixSection').classList.remove('hidden');
            document.getElementById('heroTitle').innerHTML = `Welcome back, <br><span class="text-blue-500 neon-text italic">${label}</span>`;
            document.getElementById('totalProfitVal').innerText = "$" + parseFloat(earns).toFixed(2);
            document.getElementById('teamSizeVal').innerText = squad;
            buildTable(squad, earns);
        }

        function buildTable(squad, earns) {
            const body = document.getElementById('matrixTableBody');
            body.innerHTML = "";
            const caps = [10, 100, 1000, 10000, 100000, 1000000, 10000000, 100000000, "Global"];
            caps.forEach((cap, i) => {
                const rowLvl = i + 1;
                const count = (rowLvl === 1) ? squad : "0";
                const profit = (rowLvl === 1) ? parseFloat(earns).toFixed(2) : "0.00";
                body.innerHTML += `<tr>
                    <td class="text-gray-500 font-bold uppercase">Level ${rowLvl}</td>
                    <td><span class="text-blue-400 font-bold">${count}</span> / ${cap.toLocaleString()}</td>
                    <td class="text-green-500 font-bold font-mono">$${profit}</td>
                </tr>`;
            });
        }

        async function updateUI() {
            const bal = await usdtContract.balanceOf(userAddr);
            document.getElementById('userBalance').innerText = "$" + parseFloat(ethers.formatUnits(bal, 6)).toFixed(2);
            const total = await contract.totalUsers();
            document.getElementById('totalUsers').innerText = total.toString();
            document.getElementById('refLinkInput').value = `https://comrade6.com/?ref=${userAddr}`;
        }

        function copyRef() {
            const inp = document.getElementById('refLinkInput');
            inp.select();
            navigator.clipboard.writeText(inp.value);
            alert("Copied!");
        }

        async function joinSquad(amount) {
            if (!document.getElementById('riskAgree').checked) return alert("Accept Legal first");
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref') || "0x0000000000000000000000000000000000000000";
            try {
                const val = ethers.parseUnits(amount.toString(), 6);
                const tx1 = await usdtContract.approve(contractAddress, val);
                await tx1.wait();
                const tx2 = await contract.join(ref, val);
                await tx2.wait();
                location.reload();
            } catch(e) { alert("Error. Check USDT/POL balance"); }
        }

        window.addEventListener('load', () => {
            if (window.ethereum) window.ethereum.on('accountsChanged', () => location.reload());
        });
    </script>
</body>
</html>
