<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script>
        const contractAddress = "0xC1e717690fF8B5820Af8C6a32ED6789805d4B366";
        const usdtAddress = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";

        const contractABI = [
            "function join(address _referrer, uint256 _package) external",
            "function totalUsers() view returns (uint256)"
        ];
        const usdtABI = [
            "function approve(address spender, uint256 amount) external returns (bool)",
            "function balanceOf(address account) view returns (uint256)"
        ];

        let signer, contract, usdtContract;

        async function connectWallet() {
            if (!window.ethereum) return alert("Please install MetaMask!");
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                
                contract = new ethers.Contract(contractAddress, contractABI, signer);
                usdtContract = new ethers.Contract(usdtAddress, usdtABI, signer);

                // Ganti teks tombol connect
                const btn = document.getElementById('connectBtn');
                btn.innerText = accounts[0].substring(0,6) + "..." + accounts[0].substring(38);
                btn.classList.replace('bg-black', 'bg-green-600');
                
                updateDashboard(accounts[0]);
            } catch (err) {
                console.error("User rejected connection", err);
            }
        }

        async function updateDashboard(address) {
            try {
                // Ambil Saldo USDT Real-Time
                const bal = await usdtContract.balanceOf(address);
                const formattedBal = parseFloat(ethers.formatUnits(bal, 6)).toFixed(2);
                document.getElementById('userBalance').innerText = "$" + formattedBal;
                
                // Ambil Total Community dari Smart Contract
                const total = await contract.totalUsers();
                document.getElementById('totalUsers').innerText = total.toString();
            } catch(e) { 
                console.log("Error updating dashboard:", e); 
            }
        }

        async function joinSquad(amount) {
            if (!signer) return connectWallet();
            const value = ethers.parseUnits(amount.toString(), 6);
            try {
                alert("Step 1: Approve USDT Allowance...");
                const tx1 = await usdtContract.approve(contractAddress, value);
                await tx1.wait();
                
                alert("Step 2: Joining the Squad...");
                const tx2 = await contract.join("0x0000000000000000000000000000000000000000", value);
                await tx2.wait();
                
                alert("Success! Welcome to Comrade Squad.");
                location.reload();
            } catch(e) { 
                alert("Transaction Failed! Please check your POL and USDT balance."); 
            }
        }

        // --- SATPAM REAL-TIME (EVENT LISTENERS) ---
        if (window.ethereum) {
            // Jika user ganti akun di MetaMask, otomatis update dashboard
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    connectWallet(); 
                } else {
                    location.reload();
                }
            });

            // Jika user ganti jaringan, paksa refresh
            window.ethereum.on('chainChanged', () => location.reload());
        }

        // --- PENGGANTI WINDOW ONLOAD ---
        // Ini memastikan tombol "hidup" saat halaman selesai loading
        document.addEventListener("DOMContentLoaded", () => {
            console.log("Comrade6 Engine Started...");
            // Jika user sudah pernah connect, otomatis panggil connectWallet
            if (window.ethereum) {
                window.ethereum.request({ method: 'eth_accounts' }).then(accounts => {
                    if (accounts.length > 0) connectWallet();
                });
            }
        });
    </script>
