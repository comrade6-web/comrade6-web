<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comrade6 | World Community</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232563eb%22/><text y=%22.9em%22 font-size=%2280%22 font-weight=%22bold%22 font-style=%22italic%22 x=%2220%22 fill=%22white%22>6</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #000; color: #fff; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        tr { border-bottom: 1px solid #111; }
        .neon-blue { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b border-white/5">
        <div class="flex items-center gap-2 font-bold italic text-2xl">
            <div class="w-10 h-10 bg-blue-600 rounded flex items-center justify-center text-white shadow-lg">6</div>
            <span>COMRADE<span class="text-blue-500">6</span></span>
        </div>
        <div class="text-right">
            <button id="btnConnect" class="bg-blue-600 px-6 py-2 rounded-full text-[10px] font-bold uppercase hover:bg-blue-700 transition">Connect Wallet</button>
            <p id="globalCount" class="text-[8px] text-blue-500 mt-2 uppercase tracking-widest font-bold hidden tracking-widest">Global Squad: 0</p>
        </div>
    </nav>

    <section class="max-w-5xl mx-auto text-center py-12 px-6">
        <h1 class="text-6xl md:text-8xl font-black italic uppercase tracking-tighter mb-16 leading-tight">Transparent <br><span class="text-blue-500 neon-blue">Growth</span></h1>

        <div id="doorJoin" class="block">
            <div class="max-w-xl mx-auto mb-10 p-8 glass rounded-[2rem] text-left">
                <p class="text-[11px] text-gray-500 uppercase leading-relaxed font-bold">
                    <input type="checkbox" id="checkRisk" class="mr-3 w-4 h-4 cursor-pointer accent-blue-600"> Legal Disclaimer: I understand this is a DECENTRALIZED PROTOCOL. Wallet security is my responsibility. Non-Refundable.
                </p>
            </div>
            <button id="btnJoin" class="bg-white text-black px-16 py-6 rounded-2xl text-2xl font-black italic uppercase active:scale-95 transition">ACTIVATE SQUAD - $6</button>
        </div>

        <div id="doorEmpire" class="hidden">
            <div class="grid md:grid-cols-2 gap-6 mb-12 text-left">
                <div class="glass p-8 rounded-[2rem] border-l-4 border-blue-600">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">USDT Wallet Balance</p>
                    <h3 id="txtBal" class="text-4xl font-bold text-blue-500 font-mono">$0.00</h3>
                </div>
                <div class="glass p-8 rounded-[2rem] border-l-4 border-green-600">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">Your Referral Link</p>
                    <button id="btnCopy" class="mt-2 w-full bg-blue-600 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-blue-700 transition">Copy Referral Link</button>
                </div>
            </div>

            <div class="glass p-10 rounded-[3rem] border-t-4 border-blue-600 shadow-2xl">
                <h2 class="text-2xl font-bold italic uppercase mb-12 text-center text-blue-400 tracking-[0.3em]">My Matrix Empire</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="text-gray-600 uppercase text-[10px] tracking-[0.2em] border-b border-white/5">
                                <th class="pb-6">Level</th>
                                <th class="pb-6">Squad Progress</th>
                                <th class="pb-6 text-right">Earnings</th>
                            </tr>
                        </thead>
                        <tbody id="matrixRows">
                            <tr><td colspan="3" class="p-20 text-center text-blue-500/50 animate-pulse uppercase tracking-widest text-[10px] font-bold tracking-widest">Scanning Network...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script>
        const ADDR_CONTRACT = "0xC1e717690fF8B5820Af8C6a32ED6789805d4B366";
        const ADDR_USDT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const ALCHEMY_URL = "https://polygon-mainnet.g.alchemy.com/v2/1bCZHDKrA1tHPCnktxMLL";

        let user, provider, signer, cUSDT, cSquad;

        document.getElementById('btnConnect').addEventListener('click', connect);
        document.getElementById('btnJoin').addEventListener('click', join);
        document.getElementById('btnCopy').addEventListener('click', copyRef);

        async function connect() {
            if (!window.ethereum) return alert("Install MetaMask!");
            try {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                user = (await signer.getAddress()).toLowerCase();
                document.getElementById('btnConnect').innerText = user.substring(0,6)+"..."+user.substring(38);
                
                cUSDT = new ethers.Contract(ADDR_USDT, ["function balanceOf(address) view returns (uint256)", "function approve(address, uint256) external returns (bool)"], signer);
                cSquad = new ethers.Contract(ADDR_CONTRACT, ["function join(address, uint256) external"], signer);

                document.getElementById('doorJoin').classList.add('hidden');
                document.getElementById('doorEmpire').classList.remove('hidden');

                sync();
                setInterval(sync, 15000); 
            } catch (err) { console.error("Login Fail", err); }
        }

async function sync() {
            try {
                // Kita pake Provider Standar yang paling stabil
                const alcProvider = new ethers.providers.JsonRpcProvider(ALCHEMY_URL);

                // 1. Saldo USDT (Ini wajib muncul!)
                const alcUSDT = new ethers.Contract(ADDR_USDT, ["function balanceOf(address) view returns (uint256)"], alcProvider);
                const balRaw = await alcUSDT.balanceOf(user);
                document.getElementById('txtBal').innerText = "$" + parseFloat(ethers.utils.formatUnits(balRaw, 6)).toFixed(2);

                // 2. CEK GLOBAL COUNT (Pintu Masuk)
                const resGlobal = await alcProvider.call({ to: ADDR_CONTRACT, data: "0x16584090" });
                const gUsers = ethers.BigNumber.from(resGlobal).toString();
                document.getElementById('globalCount').innerText = "Global Squad: " + gUsers;
                document.getElementById('globalCount').classList.remove('hidden');

                // 3. AMBIL DATA LEVEL 1 (Logic PPIC: Cek Langsung ke Memory Slot)
                // Kita panggil manual hex tapi hanya minta bagian Team Size
                const cleanAddr = user.replace("0x", "").toLowerCase().padStart(64, '0');
                const dataHex = "0xa87430ba" + cleanAddr;

                const rawResult = await alcProvider.call({ to: ADDR_CONTRACT, data: dataHex });

                if (rawResult && rawResult.length > 130) {
                    // Kita potong manual: Team Size biasanya ada di akhir (offset 192-256)
                    const teamHex = "0x" + rawResult.substring(rawResult.length - 64);
                    const earningsHex = "0x" + rawResult.substring(rawResult.length - 128, rawResult.length - 64);

                    const team = ethers.BigNumber.from(teamHex).toString();
                    const earns = ethers.utils.formatUnits(ethers.BigNumber.from(earningsHex), 6);

                    console.log("Found Network Data:", team, earns);
                    render(team, earns);
                } else {
                    render("0", "0.00");
                }

            } catch (err) {
                console.warn("Retrying with simple render...");
                render("0", "0.00");
            }
        }

        function render(team, earns) {
            const body = document.getElementById('matrixRows');
            body.innerHTML = "";
            const caps = [10, 100, 1000, 10000, 100000, 1000000, 10000000, 100000000, "GLOBAL"];
            caps.forEach((cap, i) => {
                const lvl = i + 1;
                const rowTeam = (lvl === 1) ? team : "0";
                const rowEarn = (lvl === 1) ? parseFloat(earns).toFixed(2) : "0.00";
                body.innerHTML += `
                    <tr class="glass">
                        <td class="p-5 font-bold text-gray-400 uppercase text-[11px]">Level ${lvl}</td>
                        <td class="p-5 font-mono"><span class="text-blue-400 font-bold">${rowTeam}</span> <span class="text-gray-800">/ ${cap.toLocaleString()}</span></td>
                        <td class="p-5 text-green-500 font-bold font-mono text-right">$${rowEarn}</td>
                    </tr>`;
            });
        }

        async function join() {
            if(!document.getElementById('checkRisk').checked) return alert("Agree disclaimer!");
            try {
                const amount = ethers.utils.parseUnits("6", 6);
                const tx1 = await cUSDT.approve(ADDR_CONTRACT, amount);
                await tx1.wait();
                const urlParams = new URLSearchParams(window.location.search);
                const ref = urlParams.get('ref') || "0x0000000000000000000000000000000000000000";
                const tx2 = await cSquad.join(ref, amount);
                await tx2.wait();
                location.reload();
            } catch (err) { alert("Failed. Check USDT/Gas."); }
        }

        function copyRef() {
            navigator.clipboard.writeText("https://comrade6.com/?ref=" + user);
            alert("Referral Link Copied!");
        }
    </script>
</body>
</html>
