<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comrade6 | World Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #000000; color: #ffffff; scroll-behavior: smooth; }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden-force { display: none !important; }
        .show-force { display: block !important; }
        tr { border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b border-white/5 uppercase tracking-widest text-[10px] font-bold">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-xl italic shadow-lg shadow-blue-500/20 text-white font-black">6</div>
            <span class="text-xl tracking-tighter italic">Comrade<span class="text-blue-500 font-black text-2xl">6</span></span>
        </div>
        <div class="flex flex-col items-end gap-2">
            <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition">Connect Wallet</button>
            <button id="syncBtn" onclick="manualSync()" class="hidden text-[8px] text-blue-400 hover:text-white uppercase tracking-widest underline">Sync My Empire</button>
        </div>
    </nav>

    <section class="max-w-6xl mx-auto text-center py-12 px-6">
        <h1 id="heroTitle" class="text-5xl md:text-8xl font-bold tracking-tighter mb-6 leading-none uppercase italic">
            Transparent <br><span class="text-blue-500 neon-text italic">Decentralized</span> Growth
        </h1>

        <div id="userDashboard" class="hidden grid md:grid-cols-3 gap-6 mb-12 text-left">
            <div class="glass-card p-8 rounded-3xl border-l-4 border-blue-600">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">My USDT</p>
                <h3 id="userBalance" class="text-4xl font-bold text-blue-500 tracking-tighter">$0.00</h3>
            </div>
            <div class="glass-card p-8 rounded-3xl border-l-4 border-white/10">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Global Squad</p>
                <h3 id="totalUsers" class="text-4xl font-bold text-white tracking-tighter">0</h3>
            </div>
            <div class="glass-card p-8 rounded-3xl border-l-4 border-green-600">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">My Ref Link</p>
                <div class="flex flex-col gap-3">
                    <input type="text" id="refLinkInput" readonly class="bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-[10px] text-blue-400 font-mono focus:outline-none" value="...">
                    <button onclick="copyRef()" class="w-full bg-blue-600 text-white px-4 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Copy Link</button>
                </div>
            </div>
        </div>

        <div id="matrixSection" class="hidden-force max-w-5xl mx-auto py-12 px-6 glass-card rounded-[40px] mb-16 border-t-4 border-blue-600 shadow-2xl">
            <h2 class="font-bold uppercase italic text-2xl mb-12 text-center tracking-widest text-blue-500">My Matrix Empire</h2>
            <div class="overflow-x-auto mb-10 text-left">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="text-gray-600 text-[10px] uppercase tracking-widest">
                            <th class="p-4 text-left">Level</th>
                            <th class="p-4 text-left">Progress</th>
                            <th class="p-4 text-left font-mono">Earnings</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody"></tbody>
                </table>
            </div>
            <div class="grid grid-cols-2 gap-10 text-left border-t border-white/5 pt-10 px-4">
                <div><p class="text-[9px] text-gray-600 uppercase font-bold tracking-widest">Squad Size</p><p id="teamSizeVal" class="text-white font-bold text-3xl tracking-tighter">0</p></div>
                <div><p class="text-[9px] text-gray-600 uppercase font-bold italic tracking-widest">Total Earnings</p><p id="totalProfitVal" class="text-green-500 font-bold text-3xl tracking-tighter">$0.00</p></div>
            </div>
        </div>

        <div id="joinArea" class="show-force">
            <div class="max-w-2xl mx-auto mb-10 p-8 glass-card rounded-3xl border-red-900/20 text-left">
                <div class="flex items-start gap-4">
                    <input type="checkbox" id="riskAgree" class="mt-1 h-6 w-6 rounded bg-black text-blue-600 cursor-pointer">
                    <label for="riskAgree" class="text-[11px] text-gray-400 uppercase leading-relaxed font-medium cursor-pointer">
                        <span class="text-red-500 font-bold tracking-widest italic uppercase font-black">Warning:</span> I am responsible for my <span class="text-white font-bold underline italic uppercase">MetaMask Security</span>. Decantralized Protocol.
                    </label>
                </div>
            </div>
            <button onclick="joinSquad(6)" class="bg-white text-black px-16 py-6 rounded-2xl text-2xl font-black hover:bg-blue-500 hover:text-white transition transform active:scale-95 uppercase italic tracking-tighter shadow-2xl">ACTIVATE SQUAD - $6</button>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script>
        const contractAddr = "0xC1e717690fF8B5820Af8C6a32ED6789805d4B366";
        const usdtAddr = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const founder001 = "0x31838e2FA16f364b54B8F3B186f3AeeD68df816f".toLowerCase();

        const contractABI = [
            "function join(address _referrer, uint256 _package) external", 
            "function totalUsers() view returns (uint256)",
            "function users(address) view returns (address referrer, uint256 package, uint256 totalEarnings, uint256 teamSize)"
        ];
        const usdtABI = ["function balanceOf(address account) view returns (uint256)", "function approve(address spender, uint256 amount) view returns (bool)"];

        let provider, signer, contract, usdtContract, userAddr;

        async function connectWallet() {
            if (!window.ethereum) return alert("Install MetaMask!");
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddr = accounts[0];
                signer = await provider.getSigner();
                contract = new ethers.Contract(contractAddr, contractABI, signer);
                usdtContract = new ethers.Contract(usdtAddr, usdtABI, signer);

                document.getElementById('connectBtn').innerText = userAddr.substring(0,6) + "...";
                document.getElementById('userDashboard').classList.remove('hidden');
                document.getElementById('syncBtn').classList.remove('hidden');

                manualSync();
            } catch(e) { console.error(e); }
        }

        async function manualSync() {
            if (!userAddr) return;
            try {
                // 1. Get Basic Stats
                const bal = await usdtContract.balanceOf(userAddr);
                document.getElementById('userBalance').innerText = "$" + parseFloat(ethers.formatUnits(bal, 6)).toFixed(2);
                const totalGlobal = await contract.totalUsers();
                document.getElementById('totalUsers').innerText = totalGlobal.toString();
                document.getElementById('refLinkInput').value = `https://comrade6.com/?ref=${userAddr}`;

                // 2. Member Status (The Safety Check)
                const data = await contract.users(userAddr);
                const isFounder = userAddr.toLowerCase() === founder001;
                const isMember = data.package > 0n || data.referrer !== "0x0000000000000000000000000000000000000000";

                if (isFounder || isMember) {
                    openDashboard(data, isFounder);
                }
            } catch(e) { console.log("Sync delay, but keep moving..."); }
        }

        function openDashboard(data, isFounder) {
            document.getElementById('joinArea').classList.add('hidden-force');
            document.getElementById('matrixSection').classList.add('show-force');
            document.getElementById('heroTitle').innerHTML = `WELCOME BACK, <br><span class="text-blue-500 neon-text italic uppercase">${isFounder ? 'FOUNDER 001' : 'COMRADE'}</span>`;
            
            const earnings = ethers.formatUnits(data.totalEarnings || 0n, 6);
            const team = (data.teamSize || 0n).toString();

            document.getElementById('totalProfitVal').innerText = "$" + parseFloat(earnings).toFixed(2);
            document.getElementById('teamSizeVal').innerText = team;

            const body = document.getElementById('matrixTableBody');
            body.innerHTML = "";
            const caps = [10, 100, 1000, 10000, 100000, 1000000, 10000000, 100000000, "GLOBAL"];
            caps.forEach((cap, i) => {
                const lvl = i + 1;
                const rowSquad = (lvl === 1) ? team : "0";
                const rowEarn = (lvl === 1) ? parseFloat(earnings).toFixed(2) : "0.00";
                body.innerHTML += `<tr>
                    <td class="p-4 font-bold text-gray-500 uppercase text-[11px]">Level ${lvl}</td>
                    <td class="p-4"><span class="text-blue-400 font-bold">${rowSquad}</span> / ${cap.toLocaleString()}</td>
                    <td class="p-4 text-green-500 font-bold font-mono">$${rowEarn}</td>
                </tr>`;
            });
        }

        async function joinSquad(amount) {
            if (!document.getElementById('riskAgree').checked) return alert("Check the legal box!");
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref') || "0x0000000000000000000000000000000000000000";
            const val = ethers.parseUnits(amount.toString(), 6);
            const tx1 = await usdtContract.approve(contractAddr, val);
            await tx1.wait();
            const tx2 = await contract.join(ref, val);
            await tx2.wait();
            location.reload();
        }

        function copyRef() {
            const inp = document.getElementById('refLinkInput');
            inp.select();
            navigator.clipboard.writeText(inp.value);
            alert("Copied!");
        }

        window.addEventListener('load', () => {
            if (window.ethereum) window.ethereum.on('accountsChanged', () => location.reload());
        });
        setInterval(manualSync, 6000);
    </script>
</body>
</html>
