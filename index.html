<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comrade6 | World Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #000000; color: #ffffff; scroll-behavior: smooth; }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tree-line { width: 2px; height: 30px; background: rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl italic shadow-lg">6</div>
            <span class="text-xl font-bold tracking-tighter uppercase italic">Comrade<span class="text-blue-500">6</span></span>
        </div>
        <div id="navLinks" class="hidden md:flex gap-8 text-sm font-medium text-gray-500 uppercase tracking-widest">
            <a href="#how-it-works" id="strategyLink" class="hover:text-blue-400 transition">Strategy</a>
            <a href="#faq" id="guideLink" class="hover:text-blue-400 transition uppercase">Guide</a>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 text-white px-6 py-2 rounded-full text-[10px] font-bold hover:bg-blue-700 transition uppercase tracking-widest">Connect Wallet</button>
    </nav>

    <section class="max-w-5xl mx-auto text-center py-16 px-6">
        <h1 id="heroTitle" class="text-5xl md:text-8xl font-bold tracking-tighter mb-6 leading-none uppercase italic">
            Transparent <br><span class="text-blue-500 neon-text italic">Decentralized</span> Growth
        </h1>
        
        <div id="userDashboard" class="hidden grid md:grid-cols-3 gap-6 mb-16 text-left">
            <div class="glass-card p-8 rounded-3xl border-l-4 border-blue-600 shadow-xl shadow-blue-900/10">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-bold">My Balance</p>
                <h3 id="userBalance" class="text-4xl font-bold text-blue-500 tracking-tighter">$0.00</h3>
            </div>
            <div class="glass-card p-8 rounded-3xl border-l-4 border-white/10">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-bold">Global Squad</p>
                <h3 id="totalUsers" class="text-4xl font-bold text-white tracking-tighter">0</h3>
            </div>
            <div class="glass-card p-8 rounded-3xl border-l-4 border-green-600">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-bold">Referral Link</p>
                <div class="flex flex-col gap-3">
                    <input type="text" id="refLinkInput" readonly class="bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-[10px] text-blue-400 font-mono" value="...">
                    <button onclick="copyRef()" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-xl text-[10px] font-bold transition uppercase tracking-widest">Copy My Link</button>
                </div>
            </div>
        </div>

        <div id="matrixSection" class="hidden max-w-4xl mx-auto py-12 px-6 glass-card rounded-[40px] mb-16 border-t-4 border-blue-600 shadow-2xl">
            <h2 class="font-bold uppercase tracking-tighter italic text-xl mb-12">My Empire</h2>
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center border-4 border-white/10 mb-2 shadow-lg shadow-blue-500/30">
                    <span class="text-xs font-black italic uppercase">You</span>
                </div>
                <div class="tree-line"></div>
                <div class="flex gap-10 mt-2">
                    <div id="memberNode" class="w-14 h-14 bg-green-500 rounded-full flex items-center justify-center border-2 border-white/20 shadow-lg shadow-green-500/20">
                        <span class="text-[8px] font-black italic uppercase">Comrade</span>
                    </div>
                    <div class="w-14 h-14 bg-white/5 border-2 border-dashed border-white/10 rounded-full flex items-center justify-center">
                        <span class="text-[8px] text-gray-600 font-bold uppercase tracking-tighter">Open</span>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-16 text-center border-t border-white/5 pt-10 uppercase">
                <div><p class="text-[8px] text-gray-500 font-bold mb-1 tracking-widest">LVL 2</p><p class="text-xl font-bold">0</p></div>
                <div><p class="text-[8px] text-gray-500 font-bold mb-1 tracking-widest">LVL 3</p><p class="text-xl font-bold">0</p></div>
                <div><p class="text-[8px] text-gray-500 font-bold mb-1 tracking-widest">Team Size</p><p id="myTeamSize" class="text-xl font-bold">0</p></div>
                <div><p class="text-[8px] text-blue-400 font-bold mb-1 tracking-widest italic">Earnings</p><p id="totalProfitLabel" class="text-xl font-bold text-blue-400 tracking-tighter">$0.00</p></div>
            </div>
        </div>

        <div id="joinArea">
            <div class="max-w-xl mx-auto mb-10 p-6 glass-card rounded-3xl border-red-900/20 text-left">
                <div class="flex items-start gap-4">
                    <input type="checkbox" id="riskAgree" class="mt-1 h-5 w-5 rounded border-white/10 bg-black text-blue-600 cursor-pointer">
                    <label for="riskAgree" class="text-[10px] text-gray-500 uppercase leading-relaxed font-medium cursor-pointer">
                        <span class="text-red-500 font-bold uppercase">Attention:</span> Transactions are <span class="text-white font-bold uppercase tracking-tighter">Non-Refundable</span>. Ensure your <span class="text-white font-bold italic uppercase">MetaMask Safety</span>.
                    </label>
                </div>
            </div>
            <button onclick="joinSquad(6)" class="bg-white text-black px-12 py-5 rounded-2xl text-2xl font-black hover:bg-blue-500 hover:text-white transition uppercase italic tracking-tighter shadow-lg shadow-white/5">Join Squad - $6</button>
        </div>
    </section>

    <footer class="py-20 border-t border-white/5 text-center">
        <div class="flex justify-center gap-10 mb-8 font-bold text-[10px] tracking-widest uppercase">
            <a href="https://www.instagram.com/comradeworldcommunity/" target="_blank" class="text-gray-500 hover:text-white transition">Instagram</a>
            <a href="https://www.youtube.com/channel/UCNr4THFT-uOfy6fy22_WiIg" target="_blank" class="text-gray-500 hover:text-white transition">YouTube</a>
        </div>
        <p class="text-[10px] text-gray-700 uppercase tracking-[0.4em]">© 2026 COMRADE6 WORLD COMMUNITY</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script>
        const contractAddress = "0xC1e717690fF8B5820Af8C6a32ED6789805d4B366";
        const usdtAddress = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const founder001 = "0x31838e2FA16f364b54B8F3B186f3AeeD68df816f".toLowerCase();

        const contractABI = [
            "function join(address _referrer, uint256 _package) external", 
            "function totalUsers() view returns (uint256)",
            "function users(address) view returns (address, uint256, uint256, uint256)"
        ];
        const usdtABI = ["function approve(address spender, uint256 amount) external returns (bool)", "function balanceOf(address account) view returns (uint256)"];

        let signer, contract, usdtContract, userAddr;

        async function connectWallet() {
            if (!window.ethereum) return alert("Install MetaMask!");
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddr = accounts[0];
                signer = await provider.getSigner();
                contract = new ethers.Contract(contractAddress, contractABI, signer);
                usdtContract = new ethers.Contract(usdtAddress, usdtABI, signer);

                document.getElementById('connectBtn').innerText = userAddr.substring(0,6) + "...";
                document.getElementById('userDashboard').classList.remove('hidden');
                document.getElementById('navLinks').classList.remove('hidden');

                // CEK STATUS DENGAN LOGIKA BERLAPIS
                await checkStatus();
                updateUI();
            } catch (err) { console.error(err); }
        }

        async function checkStatus() {
            if (!userAddr) return;
            try {
                // 1. BYPASS FOUNDER 001
                if (userAddr.toLowerCase() === founder001) {
                    switchToMemberMode("FOUNDER 001", "MASTER", "GLOBAL");
                    return;
                }

                // 2. CEK MEMBER BIASA (DOMPET 002 DST)
                const userData = await contract.users(userAddr);
                // Kita cek indeks ke-1 (Package) dan indeks ke-0 (Referrer)
                // Jika Referrer bukan 0x00... berarti user sudah terdaftar di mapping contract
                if (userData[0] !== "0x0000000000000000000000000000000000000000" || parseInt(userData[1]) > 0) {
                    const profit = parseFloat(ethers.formatUnits(userData[2], 6)).toFixed(2);
                    const team = userData[3].toString();
                    switchToMemberMode("COMRADE", profit, team);
                }
            } catch(e) { console.log("Status Check Failed", e); }
        }

        function switchToMemberMode(label, profit, team) {
            document.getElementById('joinArea').classList.add('hidden');
            document.getElementById('strategyLink').classList.add('hidden');
            document.getElementById('matrixSection').classList.remove('hidden');
            document.getElementById('heroTitle').innerHTML = `Welcome Back, <br><span class="text-blue-500 neon-text italic">${label}</span>`;
            document.getElementById('totalProfitLabel').innerText = (profit === "MASTER") ? "MASTER" : "$" + profit;
            document.getElementById('myTeamSize').innerText = team;
        }

        async function updateUI() {
            if (!userAddr) return;
            const bal = await usdtContract.balanceOf(userAddr);
            document.getElementById('userBalance').innerText = "$" + parseFloat(ethers.formatUnits(bal, 6)).toFixed(2);
            const total = await contract.totalUsers();
            document.getElementById('totalUsers').innerText = total.toString();
            document.getElementById('refLinkInput').value = `https://comrade6.com/?ref=${userAddr}`;
        }

        function copyRef() {
            const input = document.getElementById('refLinkInput');
            input.select();
            navigator.clipboard.writeText(input.value);
            alert("Referral Link Copied!");
        }

        async function joinSquad(amount) {
            if (!document.getElementById('riskAgree').checked) return alert("Agree to terms!");
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref') || "0x0000000000000000000000000000000000000000";
            const value = ethers.parseUnits(amount.toString(), 6);
            try {
                const tx1 = await usdtContract.approve(contractAddress, value);
                await tx1.wait();
                const tx2 = await contract.join(ref, value);
                await tx2.wait();
                location.reload();
            } catch(e) { alert("Transaction Failed."); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (window.ethereum) {
                window.ethereum.request({ method: 'eth_accounts' }).then(accs => { if (accs.length > 0) connectWallet(); });
                window.ethereum.on('accountsChanged', () => location.reload());
            }
        });
    </script>
</body>
</html>
