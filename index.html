<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comrade6 | World Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #000000; color: #ffffff; scroll-behavior: smooth; }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        tr { border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; }
        th { color: #6b7280; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; padding: 20px 15px; }
        td { padding: 20px 15px; font-size: 13px; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b border-white/5 uppercase tracking-widest text-[10px] font-bold">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-xl italic shadow-lg shadow-blue-900/30">6</div>
            <span class="text-xl tracking-tighter">Comrade<span class="text-blue-500">6</span></span>
        </div>
        <div id="navLinks" class="hidden md:flex gap-8 text-gray-500">
            <a href="#matrixSection" class="hover:text-blue-400 transition">My Empire</a>
            <a href="#faq" class="hover:text-blue-400 transition">Guide</a>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition tracking-widest">Connect Wallet</button>
    </nav>

    <section class="max-w-6xl mx-auto text-center py-16 px-6">
        <h1 id="heroTitle" class="text-5xl md:text-8xl font-bold tracking-tighter mb-6 leading-none uppercase italic">
            Transparent <br><span class="text-blue-500 neon-text italic">Decentralized</span> Growth
        </h1>

        <div id="userDashboard" class="hidden grid md:grid-cols-3 gap-6 mb-16 text-left">
            <div class="glass-card p-8 rounded-3xl border-l-4 border-blue-600 shadow-xl shadow-blue-900/10">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-bold font-mono">My Wallet</p>
                <h3 id="userBalance" class="text-4xl font-bold text-blue-500 tracking-tighter">$0.00</h3>
            </div>
            <div class="glass-card p-8 rounded-3xl border-l-4 border-white/10">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-bold font-mono">Global Squad</p>
                <h3 id="totalUsers" class="text-4xl font-bold text-white tracking-tighter">0</h3>
            </div>
            <div class="glass-card p-8 rounded-3xl border-l-4 border-green-600">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-bold font-mono">Referral Link</p>
                <div class="flex flex-col gap-3">
                    <input type="text" id="refLinkInput" readonly class="bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-[10px] text-blue-400 font-mono" value="...">
                    <button onclick="copyRef()" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-xl text-[10px] font-bold transition uppercase tracking-widest shadow-lg shadow-blue-900/20">Copy My Link</button>
                </div>
            </div>
        </div>

        <div id="matrixSection" class="hidden max-w-5xl mx-auto py-12 px-6 glass-card rounded-[40px] mb-16 border-t-4 border-blue-600 shadow-2xl">
            <h2 class="font-bold uppercase tracking-tighter italic text-2xl mb-12 text-center tracking-widest">My Matrix Empire</h2>
            <div class="overflow-x-auto mb-10">
                <table class="w-full text-left">
                    <thead>
                        <tr>
                            <th>Level</th>
                            <th>Progress (Members)</th>
                            <th>Capacity</th>
                            <th>Earnings</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody">
                        </tbody>
                </table>
            </div>
            <div class="text-left px-4 border-t border-white/5 pt-12 grid grid-cols-2 md:grid-cols-3 gap-10">
                <div><p class="text-[8px] text-gray-600 uppercase font-bold">Account Status</p><p class="text-blue-500 uppercase italic font-bold">Active Comrade</p></div>
                <div><p class="text-[8px] text-gray-600 uppercase font-bold">Squad Size</p><p id="teamSizeVal" class="text-white font-bold text-xl">0</p></div>
                <div><p class="text-[8px] text-gray-600 uppercase font-bold italic">Total Payouts</p><p id="totalProfitVal" class="text-green-500 font-bold text-xl">$0.00</p></div>
            </div>
        </div>

        <div id="joinArea">
            <div class="max-w-2xl mx-auto mb-10 p-8 glass-card rounded-3xl border-red-900/20 text-left">
                <div class="flex items-start gap-4">
                    <input type="checkbox" id="riskAgree" class="mt-1 h-6 w-6 rounded border-white/10 bg-black text-blue-600 cursor-pointer">
                    <label for="riskAgree" class="text-[11px] text-gray-400 uppercase leading-relaxed font-medium cursor-pointer">
                        <span class="text-red-500 font-bold">LEGAL:</span> This is a <span class="text-white font-bold">DECENTRALIZED PROTOCOL</span>. I am responsible for my <span class="text-white font-bold italic underline uppercase">MetaMask Security</span>. No liability for developers. Transactions are <span class="text-white font-bold uppercase underline">Non-Refundable</span>.
                    </label>
                </div>
            </div>
            <button onclick="joinSquad(6)" class="bg-white text-black px-16 py-6 rounded-2xl text-2xl font-black hover:bg-blue-500 hover:text-white transition transform active:scale-95 uppercase italic tracking-tighter shadow-2xl">Activate Squad - $6</button>
        </div>
    </section>

    <footer class="py-20 border-t border-white/5 text-center text-[10px] tracking-[0.5em] text-gray-700 uppercase">
        © 2026 COMRADE6 WORLD COMMUNITY PROTOCOL
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script>
        const contractAddress = "0xC1e717690fF8B5820Af8C6a32ED6789805d4B366";
        const usdtAddress = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const founder001 = "0x31838e2FA16f364b54B8F3B186f3AeeD68df816f".toLowerCase();

        const contractABI = [
            "function join(address _referrer, uint256 _package) external", 
            "function totalUsers() view returns (uint256)",
            "function users(address) view returns (address, uint256, uint256, uint256)"
        ];
        const usdtABI = ["function approve(address spender, uint256 amount) external returns (bool)", "function balanceOf(address account) view returns (uint256)"];

        let signer, contract, usdtContract, userAddr;

        async function connectWallet() {
            if (!window.ethereum) return;
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddr = accounts[0];
                signer = await provider.getSigner();
                contract = new ethers.Contract(contractAddress, contractABI, signer);
                usdtContract = new ethers.Contract(usdtAddress, usdtABI, signer);

                document.getElementById('connectBtn').innerText = userAddr.substring(0,6) + "..." + userAddr.substring(38);
                document.getElementById('userDashboard').classList.remove('hidden');

                // POLLING SYSTEM: Cek tiap 2 detik sampai terbuka
                const statusInterval = setInterval(async () => {
                    const isMember = await forceAuditCheck();
                    if (isMember) clearInterval(statusInterval);
                }, 2000);
                
                updateUI();
            } catch (err) { console.error(err); }
        }

        async function forceAuditCheck() {
            if (!userAddr) return false;
            try {
                if (userAddr.toLowerCase() === founder001) {
                    // Founder manually gets direct count check
                    const data = await contract.users(userAddr);
                    const earnings = ethers.formatUnits(data[2], 6);
                    switchToMemberMode("FOUNDER 001", earnings, data[3].toString());
                    return true;
                }

                const data = await contract.users(userAddr);
                // Jika package > 0 atau ada referrer
                if (BigInt(data[1]) > 0n || data[0] !== "0x0000000000000000000000000000000000000000") {
                    const profit = ethers.formatUnits(data[2], 6);
                    switchToMemberMode("COMRADE", profit, data[3].toString());
                    return true;
                }
            } catch(e) { console.log(e); }
            return false;
        }

        function switchToMemberMode(label, profit, team) {
            document.getElementById('joinArea').classList.add('hidden');
            document.getElementById('matrixSection').classList.remove('hidden');
            document.getElementById('heroTitle').innerHTML = `Welcome Back, <br><span class="text-blue-500 neon-text italic">${label}</span>`;
            document.getElementById('totalProfitVal').innerText = "$" + parseFloat(profit).toFixed(2);
            document.getElementById('teamSizeVal').innerText = team;
            
            buildTable(team, profit);
        }

        function buildTable(teamSize, profit) {
            const body = document.getElementById('matrixTableBody');
            const rows = [
                {lvl:1, cap:10}, {lvl:2, cap:100}, {lvl:3, cap:1000}, {lvl:4, cap:10000}, {lvl:5, cap:100000}, {lvl:6, cap:1000000}, {lvl:7, cap:10000000}, {lvl:8, cap:100000000}, {lvl:9, cap:"Global"}
            ];
            body.innerHTML = "";
            rows.forEach(r => {
                // Tampilkan Progress Level 1 dari teamSize, Earnings dari profit
                const count = (r.lvl === 1) ? teamSize : "0";
                const earn = (r.lvl === 1) ? parseFloat(profit).toFixed(2) : "0.00";
                body.innerHTML += `<tr>
                    <td class="text-gray-500 font-bold uppercase tracking-widest text-[11px]">Level ${r.lvl}</td>
                    <td><span class="text-blue-400 font-bold">${count}</span> / ${r.cap.toLocaleString()}</td>
                    <td class="text-gray-600 font-mono text-[11px]">${r.cap.toLocaleString()}</td>
                    <td class="text-green-500 font-bold font-mono">$${earn}</td>
                </tr>`;
            });
        }

        async function updateUI() {
            const bal = await usdtContract.balanceOf(userAddr);
            document.getElementById('userBalance').innerText = "$" + parseFloat(ethers.formatUnits(bal, 6)).toFixed(2);
            const total = await contract.totalUsers();
            document.getElementById('totalUsers').innerText = total.toString();
            document.getElementById('refLinkInput').value = `https://comrade6.com/?ref=${userAddr}`;
        }

        function copyRef() {
            const input = document.getElementById('refLinkInput');
            input.select();
            navigator.clipboard.writeText(input.value);
            alert("Referral Link Copied!");
        }

        async function joinSquad(amount) {
            if (!document.getElementById('riskAgree').checked) return alert("Accept disclaimer!");
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref') || "0x0000000000000000000000000000000000000000";
            try {
                const val = ethers.parseUnits(amount.toString(), 6);
                const tx1 = await usdtContract.approve(contractAddress, val);
                await tx1.wait();
                const tx2 = await contract.join(ref, val);
                await tx2.wait();
                location.reload();
            } catch(e) { alert("Fail!"); }
        }

        window.addEventListener('load', () => {
            if (window.ethereum) { window.ethereum.on('accountsChanged', () => location.reload()); }
        });
    </script>
</body>
</html>
