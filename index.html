<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comrade6 | Community Matrix</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232563eb%22/><text y=%22.9em%22 font-size=%2280%22 font-weight=%22bold%22 font-style=%22italic%22 x=%2220%22 fill=%22white%22>6</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #000; color: #fff; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        tr { border-bottom: 1px solid #111; transition: 0.3s; }
        tr:hover { background: rgba(59, 130, 246, 0.03); }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b border-white/5">
        <div class="flex items-center gap-2 font-bold italic text-2xl">
            <div class="w-10 h-10 bg-blue-600 rounded flex items-center justify-center text-white shadow-lg">6</div>
            <span>COMRADE<span class="text-blue-500">6</span></span>
        </div>
        <div class="text-right">
            <button id="btnConnect" class="bg-blue-600 px-6 py-2 rounded-full text-[10px] font-bold uppercase hover:bg-blue-700 transition shadow-lg shadow-blue-900/20">Connect Wallet</button>
            <p id="globalCount" class="text-[8px] text-blue-500 mt-2 uppercase tracking-[0.3em] font-bold hidden">Global Squad: 0</p>
        </div>
    </nav>

    <section class="max-w-5xl mx-auto text-center py-12 px-6">
        <h1 class="text-6xl md:text-8xl font-black italic uppercase tracking-tighter mb-16 leading-tight">Transparent <br><span class="text-blue-500" style="text-shadow: 0 0 15px rgba(59,130,246,0.5)">Growth</span></h1>

        <div id="doorJoin" class="block">
            <div class="max-w-xl mx-auto mb-10 p-8 glass rounded-[2rem] text-left border-white/5">
                <p class="text-[11px] text-gray-500 uppercase leading-relaxed font-bold tracking-wider">
                    <input type="checkbox" id="checkRisk" class="mr-3 w-4 h-4 cursor-pointer accent-blue-600"> I understand this is a DECENTRALIZED PROTOCOL. Wallet security is my responsibility.
                </p>
            </div>
            <button id="btnJoin" class="bg-white text-black px-16 py-6 rounded-2xl text-2xl font-black italic uppercase active:scale-95 transition hover:bg-blue-500 hover:text-white">ACTIVATE SQUAD - $6</button>
        </div>

        <div id="doorEmpire" class="hidden animate-in fade-in duration-700">
            <div class="grid md:grid-cols-2 gap-6 mb-12 text-left">
                <div class="glass p-8 rounded-[2rem] border-l-4 border-blue-600">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">USDT Wallet Balance</p>
                    <h3 id="txtBal" class="text-4xl font-bold text-blue-500 font-mono tracking-tighter">$0.00</h3>
                </div>
                <div class="glass p-8 rounded-[2rem] border-l-4 border-green-600">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">Your Referral Link</p>
                    <button id="btnCopy" class="mt-2 w-full bg-blue-600 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-blue-700 transition">Copy Referral Link</button>
                </div>
            </div>

            <div class="glass p-10 rounded-[3rem] border-t-4 border-blue-600 shadow-2xl relative">
                <h2 class="text-2xl font-bold italic uppercase mb-12 text-center text-blue-400 tracking-[0.3em]">My Matrix Empire</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm border-separate border-spacing-y-2">
                        <thead>
                            <tr class="text-gray-600 uppercase text-[10px] tracking-[0.2em]">
                                <th class="pb-6 px-4">Level</th>
                                <th class="pb-6">Squad Progress</th>
                                <th class="pb-6 text-right px-4">Earnings</th>
                            </tr>
                        </thead>
                        <tbody id="matrixRows">
                            <tr><td colspan="3" class="p-20 text-center text-blue-500/50 animate-pulse uppercase tracking-widest text-[10px] font-bold">Synchronizing...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script>
        const ADDR_CONTRACT = "0xC1e717690fF8B5820Af8C6a32ED6789805d4B366";
        const ADDR_USDT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const ALCHEMY_URL = "https://polygon-mainnet.g.alchemy.com/v2/1bCZHDKrA1tHPCnktxMLL";

        let user, provider, signer, cUSDT, cSquad;

        document.getElementById('btnConnect').addEventListener('click', connect);
        document.getElementById('btnJoin').addEventListener('click', join);
        document.getElementById('btnCopy').addEventListener('click', copyRef);

        async function connect() {
            if (!window.ethereum) return alert("Install MetaMask!");
            try {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                user = (await signer.getAddress()).toLowerCase();
                document.getElementById('btnConnect').innerText = user.substring(0,6)+"..."+user.substring(38);
                
                cUSDT = new ethers.Contract(ADDR_USDT, ["function balanceOf(address) view returns (uint256)", "function approve(address, uint256) external returns (bool)"], signer);
                cSquad = new ethers.Contract(ADDR_CONTRACT, ["function join(address, uint256) external"], signer);

                document.getElementById('doorJoin').classList.add('hidden');
                document.getElementById('doorEmpire').classList.remove('hidden');

                sync();
                setInterval(sync, 15000); 
            } catch (err) { console.error("Login Fail", err); }
        }

async function sync() {
            try {
                const alcProvider = new ethers.providers.JsonRpcProvider(ALCHEMY_URL);

                // 1. SALDO USDT (Tetap lewat Alchemy karena Simple)
                const balRaw = await cUSDT.balanceOf(user);
                document.getElementById('txtBal').innerText = "$" + parseFloat(ethers.utils.formatUnits(balRaw, 6)).toFixed(2);

                // 2. AUDIT LEWAT POLYGONSCAN (Bypass Limit 10 Block Alchemy)
                console.log("🕵️ Bypassing Alchemy... Auditing via PolygonScan API...");
                
                // Ganti Alamat Kontrak & USDT ke Huruf Kecil untuk Filter
                const contractAddr = ADDR_CONTRACT.toLowerCase();
                const userAddr = user.toLowerCase();

                // Kita ambil history transfer USDT (ERC20) kamu
                // Link ini publik, limitnya 5 panggilan per detik (sangat cukup)
                const apiURL = `https://api.polygonscan.com/api?module=account&action=tokentx&contractaddress=${ADDR_USDT}&address=${userAddr}&startblock=0&endblock=99999999&sort=desc&apikey=YourApiKeyToken`;

                const response = await fetch(apiURL);
                const data = await response.json();

                if (data.status === "1" && data.result) {
                    // FILTER: Ambil hanya transfer yang berasal DARI Kontrak Kamu
                    const myCredits = data.result.filter(tx => tx.from.toLowerCase() === contractAddr);
                    
                    // A. HITUNG EARNINGS (Sum All)
                    let totalIncome = 0;
                    myCredits.forEach(tx => {
                        totalIncome += parseFloat(ethers.utils.formatUnits(tx.value, 6));
                    });

                    // B. HITUNG UNIQUE USERS (Alignment Logic)
                    // Karena 1 user = 1 hash transaksi yang sama untuk 10 baris distribusi
                    // Kita kumpulkan Transaction Hash yang unik
                    const uniqueTX = new Set();
                    myCredits.forEach(tx => uniqueTX.add(tx.hash));

                    const squadSize = uniqueTX.size; // 10 baris dengan hash sama akan terhitung 1
                    const displayEarns = totalIncome.toFixed(2);

                    console.log("✅ Audit Result:", { 
                        incomes: totalIncome, 
                        squad: squadSize,
                        txFound: myCredits.length 
                    });

                    render(squadSize.toString(), displayEarns);
                    document.getElementById('globalCount').innerText = "Global Squad: " + (squadSize || "1");
                    document.getElementById('globalCount').classList.remove('hidden');

                } else {
                    console.warn("PolygonScan API returned empty or error.");
                    render("0", "0.00");
                }

            } catch (err) {
                console.error("❌ Final Audit Fail:", err);
                render("0", "0.00");
            }
        }
        function render(team, earns) {
            const body = document.getElementById('matrixRows');
            body.innerHTML = "";
            const caps = [10, 100, 1000, 10000, 100000, 1000000, 10000000, 100000000, "GLOBAL"];
            caps.forEach((cap, i) => {
                const lvl = i + 1;
                const rTeam = (lvl === 1) ? team : "0";
                const rEarn = (lvl === 1) ? parseFloat(earns).toFixed(2) : "0.00";
                body.innerHTML += `
                    <tr class="glass">
                        <td class="p-5 font-bold text-gray-400 uppercase text-[11px] px-4">Level ${lvl}</td>
                        <td class="p-5 font-mono"><span class="text-blue-400 font-bold">${rTeam}</span> <span class="text-gray-800">/ ${cap.toLocaleString()}</span></td>
                        <td class="p-5 text-green-500 font-bold font-mono text-right px-4">$${rEarn}</td>
                    </tr>`;
            });
        }

        async function join() {
            if(!document.getElementById('checkRisk').checked) return alert("Agree disclaimer!");
            try {
                const amount = ethers.utils.parseUnits("6", 6);
                const tx1 = await cUSDT.approve(ADDR_CONTRACT, amount);
                await tx1.wait();
                const urlParams = new URLSearchParams(window.location.search);
                const ref = urlParams.get('ref') || "0x0000000000000000000000000000000000000000";
                const tx2 = await cSquad.join(ref, amount);
                await tx2.wait();
                location.reload();
            } catch (err) { alert("Fail. Check USDT/Gas."); }
        }

        function copyRef() {
            navigator.clipboard.writeText("https://comrade6.com/?ref=" + user);
            alert("Referral Link Copied!");
        }
    </script>
</body>
</html>
